name: Bug Report
description: Something is broken or not working as expected
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the details below so we can reproduce and fix it.

  - type: input
    id: command
    attributes:
      label: Command you ran
      description: The exact lookout command that triggered the issue
      placeholder: "lookout investigate example.com --format json"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Paste the error message or unexpected output.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "Windows 11 / Ubuntu 22.04 / macOS 14"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      description: "Run: python --version"
      placeholder: "3.12.4"
    validations:
      required: true

  - type: dropdown
    id: install
    attributes:
      label: Installation method
      options:
        - "pip install -e . (development)"
        - "pip install . (standard)"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else that might help (screenshots, config changes, etc.)
    validations:
      required: false
