name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make Lookout better? We'd love to hear it.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do? What problem does this solve?
      placeholder: "When I investigate a domain, I also want to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this should work?
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - "New data source / API integration"
        - "Output / reporting improvement"
        - "New command or option"
        - "Wordlist / enumeration"
        - "Performance / caching"
        - "Documentation"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else (screenshots, links to similar tools, examples)
    validations:
      required: false
